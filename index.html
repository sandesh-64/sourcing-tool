<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment Sourcing Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(to bottom right, #0f172a, #1e3a8a, #0f172a);
        }
    </style>
</head>
<body>
    <div class="min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-white">🚀 Recruitment Sourcing Tool</h1>
                <p class="text-slate-300 text-lg">Upload resume → Paste JD → Instant Match Analysis</p>
            </div>

            <div class="grid grid-cols-3 gap-6">
                <!-- Left Panel -->
                <div class="col-span-1 bg-slate-800 rounded-lg border border-slate-700 p-6">
                    <h2 class="text-xl font-bold text-white mb-4">📄 Resume Upload</h2>
                    <input type="file" id="resumeFile" accept=".txt,.pdf" 
                        class="w-full p-3 bg-slate-700 border border-slate-600 rounded text-white cursor-pointer">
                    <div id="resumeStatus" class="mt-4"></div>

                    <div class="mt-6">
                        <h3 class="text-lg font-bold text-white mb-3">🔍 Sourcing Platforms</h3>
                        <div class="space-y-2">
                            <a href="https://linkedin.com/jobs" target="_blank" 
                               class="block p-3 bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 text-white">
                                <p class="font-semibold">💼 LinkedIn USA</p>
                            </a>
                            <a href="https://indeed.com" target="_blank" 
                               class="block p-3 bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 text-white">
                                <p class="font-semibold">🔍 Indeed USA</p>
                            </a>
                            <a href="https://simplyhired.com" target="_blank" 
                               class="block p-3 bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 text-white">
                                <p class="font-semibold">📋 SimplyHired USA</p>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="col-span-2 space-y-6">
                    <div class="bg-slate-800 rounded-lg border border-slate-700 p-6">
                        <h2 class="text-xl font-bold text-white mb-4">🔎 Job Analysis</h2>
                        <textarea id="jobDesc" placeholder="Paste job description here..."
                            class="w-full h-48 p-4 bg-slate-700 border border-slate-600 rounded text-white"></textarea>
                        <button onclick="analyzeJob()" 
                            class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded">
                            Analyze & Filter
                        </button>
                    </div>

                    <div id="results"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resumeText = '';

        document.getElementById('resumeFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    resumeText = event.target.result;
                    const skills = extractSkills(resumeText);
                    document.getElementById('resumeStatus').innerHTML = `
                        <div class="bg-slate-700 p-4 rounded">
                            <p class="text-green-400 font-semibold">✅ Resume Loaded!</p>
                            <p class="text-slate-300 mt-2"><strong>Skills Found:</strong> ${skills.length}</p>
                            <div class="flex flex-wrap gap-2 mt-2">
                                ${skills.slice(0, 8).map(s => `<span class="bg-blue-600 text-white px-2 py-1 rounded text-sm">${s}</span>`).join('')}
                                ${skills.length > 8 ? `<span class="bg-slate-600 text-white px-2 py-1 rounded text-sm">+${skills.length - 8} more</span>` : ''}
                            </div>
                        </div>
                    `;
                };
                reader.readAsText(file);
            }
        });

        function extractSkills(text) {
            const skills = ['java', 'python', 'javascript', 'react', 'angular', 'vue', 'spring', 'django', 'nodejs', 'express', 'docker', 'kubernetes', 'aws', 'azure', 'gcp', 'sql', 'mongodb', 'postgresql', 'mysql', 'redis', 'microservices', 'rest', 'graphql', 'devops', 'ci/cd', 'git', 'jenkins', 'gitlab', 'terraform', 'ansible'];
            const textLower = text.toLowerCase();
            return skills.filter(skill => textLower.includes(skill));
        }

        function checkBlacklist(text) {
            const blacklist = ['clearance', 'top secret', 'public trust', 'ts/sci', 'clearable', 'government agency', 'fbi', 'eqip', 'federal', 'background check', 'citizenship', 'citizen only', 'u.s. citizen', 'green card only', 'no sponsorship', 'cannot sponsor', 'c2c', 'w2 only', 'contract only'];
            const textLower = text.toLowerCase();
            return blacklist.filter(kw => textLower.includes(kw));
        }

        window.analyzeJob = function() {
            if (!resumeText || !document.getElementById('jobDesc').value) {
                alert('Please upload resume and paste job description');
                return;
            }

            const jobDesc = document.getElementById('jobDesc').value;
            const blacklistFound = checkBlacklist(jobDesc);
            const resumeSkills = extractSkills(resumeText);
            const jobSkills = extractSkills(jobDesc);
            
            let matched = 0;
            resumeSkills.forEach(skill => {
                if (jobSkills.includes(skill)) matched++;
            });

            const percentage = resumeSkills.length > 0 ? Math.round((matched / resumeSkills.length) * 100) : 0;
            let verdict = 'PASS ✅';
            let colorClass = 'green';

            if (blacklistFound.length > 0) {
                verdict = 'REJECT ❌';
                colorClass = 'red';
            } else if (percentage < 60) {
                verdict = 'WEAK ⚠️';
                colorClass = 'yellow';
            }

            document.getElementById('results').innerHTML = `
                <div class="bg-slate-800 rounded-lg border border-slate-700 p-6">
                    <h3 class="text-xl font-bold text-white mb-4">📊 Analysis Results</h3>
                    <div class="bg-${colorClass}-900 bg-opacity-30 border-l-4 border-${colorClass}-500 p-4 rounded mb-4">
                        <p class="text-lg font-bold text-${colorClass}-300">${verdict}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-slate-700 p-4 rounded">
                            <p class="text-slate-400">Match Score</p>
                            <p class="text-3xl font-bold text-blue-400">${percentage}%</p>
                        </div>
                        <div class="bg-slate-700 p-4 rounded">
                            <p class="text-slate-400">Skills Matched</p>
                            <p class="text-3xl font-bold text-green-400">${matched}/${resumeSkills.length}</p>
                        </div>
                    </div>
                    ${blacklistFound.length > 0 ? `
                        <div class="bg-red-900 bg-opacity-30 border border-red-500 rounded p-4">
                            <p class="font-bold text-red-300 mb-2">🚫 Blacklist Keywords:</p>
                            <div class="flex flex-wrap gap-2">
                                ${blacklistFound.map(kw => `<span class="bg-red-600 text-white px-3 py-1 rounded text-sm">${kw}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                    ${matched > 0 ? `
                        <div class="mt-4">
                            <p class="text-green-400 font-semibold">✅ Matched Skills:</p>
                            <div class="flex flex-wrap gap-2 mt-2">
                                ${resumeSkills.filter(skill => jobSkills.includes(skill)).map(skill => `<span class="bg-green-600 text-white px-2 py-1 rounded text-sm">${skill}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        };
    </script>
</body>
</html>
```
