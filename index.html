<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment Sourcing Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom right, #0f172a, #1e3a8a, #0f172a);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-white">🚀 Recruitment Sourcing Tool</h1>
                <p class="text-slate-300 text-lg mt-2">Upload resume → Paste JD → Instant Match Analysis</p>
            </div>

            <div class="grid grid-cols-3 gap-6">
                <!-- LEFT PANEL -->
                <div class="col-span-1 bg-slate-800 rounded-lg border border-slate-700 p-6">
                    <h2 class="text-xl font-bold text-white mb-4">📄 Resume Upload</h2>
                    <input type="file" id="resumeFile" accept=".txt,.pdf" 
                        class="w-full p-3 bg-slate-700 border border-slate-600 rounded text-white cursor-pointer hover:bg-slate-600 transition">
                    <div id="resumeStatus" class="mt-4"></div>

                    <div class="mt-6 pt-6 border-t border-slate-700">
                        <h3 class="text-lg font-bold text-white mb-3">🔍 Job Boards</h3>
                        <div class="space-y-2">
                            <a href="https://linkedin.com/jobs" target="_blank" rel="noopener noreferrer"
                               class="block p-3 bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 text-white transition">
                                <p class="font-semibold">💼 LinkedIn USA</p>
                                <p class="text-sm text-slate-400">linkedin.com/jobs</p>
                            </a>
                            <a href="https://indeed.com" target="_blank" rel="noopener noreferrer"
                               class="block p-3 bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 text-white transition">
                                <p class="font-semibold">🔍 Indeed USA</p>
                                <p class="text-sm text-slate-400">indeed.com</p>
                            </a>
                            <a href="https://simplyhired.com" target="_blank" rel="noopener noreferrer"
                               class="block p-3 bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 text-white transition">
                                <p class="font-semibold">📋 SimplyHired USA</p>
                                <p class="text-sm text-slate-400">simplyhired.com</p>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- RIGHT PANEL -->
                <div class="col-span-2 space-y-6">
                    <!-- Job Description Input -->
                    <div class="bg-slate-800 rounded-lg border border-slate-700 p-6">
                        <h2 class="text-xl font-bold text-white mb-4">🔎 Job Description Analysis</h2>
                        <textarea id="jobDesc" placeholder="Paste complete job description here..."
                            class="w-full h-48 p-4 bg-slate-700 border border-slate-600 rounded text-white placeholder-slate-400 font-mono text-sm focus:outline-none focus:border-blue-500 resize-none"></textarea>
                        <button onclick="analyzeJob()" 
                            class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition">
                            ⚡ Analyze & Filter
                        </button>
                    </div>

                    <!-- Results -->
                    <div id="results"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let resumeText = '';

        // Skills database
        const COMMON_SKILLS = [
            'java', 'python', 'javascript', 'typescript', 'react', 'angular', 'vue', 'nodejs',
            'spring', 'spring boot', 'django', 'fastapi', 'express', 'laravel',
            'docker', 'kubernetes', 'aws', 'azure', 'gcp', 'cloud',
            'sql', 'mongodb', 'postgresql', 'mysql', 'redis', 'elasticsearch',
            'microservices', 'rest', 'graphql', 'api', 'devops', 'ci/cd',
            'git', 'jenkins', 'gitlab', 'github', 'terraform', 'ansible',
            'html', 'css', 'golang', 'rust', 'scala', 'kotlin',
            'agile', 'scrum', 'jira', 'linux', 'windows', 'macos'
        ];

        const BLACKLIST_KEYWORDS = [
            'active clearance', 'top secret', 'public trust', 'ts/sci', 'clearable',
            'government agency', 'fbi', 'eqip', 'federal', 'background check',
            'citizenship', 'citizen only', 'u.s. citizen', 'green card only',
            'no sponsorship', 'cannot sponsor', 'c2c', 'w2 only', 'contract only',
            'government background', 'security clearance', 'interim clearance',
            'dod approved', 'secret clearance', 'confidential clearance'
        ];

        // Handle resume upload
        document.getElementById('resumeFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    resumeText = event.target.result;
                    const skills = extractSkills(resumeText);
                    
                    document.getElementById('resumeStatus').innerHTML = `
                        <div class="bg-slate-700 p-4 rounded">
                            <p class="text-green-400 font-semibold mb-2">✅ Resume Loaded!</p>
                            <p class="text-slate-300 mb-3"><strong>Skills Found:</strong> ${skills.length}</p>
                            <div class="flex flex-wrap gap-2">
                                ${skills.slice(0, 10).map(s => `<span class="bg-blue-600 text-white px-2 py-1 rounded text-sm">${s}</span>`).join('')}
                                ${skills.length > 10 ? `<span class="bg-slate-600 text-white px-2 py-1 rounded text-sm">+${skills.length - 10} more</span>` : ''}
                            </div>
                        </div>
                    `;
                };
                reader.readAsText(file);
            }
        });

        // Extract skills from text
        function extractSkills(text) {
            const textLower = text.toLowerCase();
            const found = [];
            
            COMMON_SKILLS.forEach(skill => {
                if (textLower.includes(skill) && !found.includes(skill)) {
                    found.push(skill);
                }
            });
            
            return found;
        }

        // Check for blacklist keywords
        function checkBlacklist(text) {
            const textLower = text.toLowerCase();
            const found = [];
            
            BLACKLIST_KEYWORDS.forEach(keyword => {
                if (textLower.includes(keyword) && !found.includes(keyword)) {
                    found.push(keyword);
                }
            });
            
            return found;
        }

        // Analyze job
        window.analyzeJob = function() {
            if (!resumeText.trim()) {
                alert('❌ Please upload resume first');
                return;
            }
            
            if (!document.getElementById('jobDesc').value.trim()) {
                alert('❌ Please paste job description');
                return;
            }

            const jobDesc = document.getElementById('jobDesc').value;
            const blacklistFound = checkBlacklist(jobDesc);
            const resumeSkills = extractSkills(resumeText);
            const jobSkills = extractSkills(jobDesc);
            
            // Calculate matched skills
            const matchedSkills = resumeSkills.filter(skill => jobSkills.includes(skill));
            const missingSkills = resumeSkills.filter(skill => !jobSkills.includes(skill));
            
            // Calculate percentage
            const percentage = resumeSkills.length > 0 
                ? Math.round((matchedSkills.length / resumeSkills.length) * 100) 
                : 0;

            // Determine verdict
            let verdict = '';
            let verdictEmoji = '';
            let colorClass = '';
            let bgColor = '';

            if (blacklistFound.length > 0) {
                verdict = 'REJECT';
                verdictEmoji = '❌';
                colorClass = 'red-300';
                bgColor = 'red-900';
            } else if (percentage >= 85) {
                verdict = 'PASS';
                verdictEmoji = '✅';
                colorClass = 'green-300';
                bgColor = 'green-900';
            } else if (percentage >= 70) {
                verdict = 'PASS';
                verdictEmoji = '✅';
                colorClass = 'green-300';
                bgColor = 'green-900';
            } else if (percentage >= 60) {
                verdict = 'WEAK';
                verdictEmoji = '⚠️';
                colorClass = 'yellow-300';
                bgColor = 'yellow-900';
            } else {
                verdict = 'REJECT';
                verdictEmoji = '❌';
                colorClass = 'red-300';
                bgColor = 'red-900';
            }

            // Build results HTML
            let resultsHTML = `
                <div class="bg-slate-800 rounded-lg border border-slate-700 p-6">
                    <h3 class="text-xl font-bold text-white mb-4">📊 Analysis Results</h3>
                    
                    <div class="bg-${bgColor} bg-opacity-30 border-l-4 border-${colorClass.split('-')[0]}-500 p-4 rounded-lg mb-4">
                        <p class="text-xl font-bold text-${colorClass}">${verdictEmoji} ${verdict}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-slate-700 p-4 rounded">
                            <p class="text-slate-400 text-sm">Overall Match</p>
                            <p class="text-3xl font-bold text-blue-400 mt-2">${percentage}%</p>
                        </div>
                        <div class="bg-slate-700 p-4 rounded">
                            <p class="text-slate-400 text-sm">Skills Matched</p>
                            <p class="text-3xl font-bold text-green-400 mt-2">${matchedSkills.length}/${resumeSkills.length}</p>
                        </div>
                    </div>
            `;

            // Blacklist found
            if (blacklistFound.length > 0) {
                resultsHTML += `
                    <div class="bg-red-900 bg-opacity-30 border border-red-500 rounded-lg p-4 mb-4">
                        <p class="font-bold text-red-300 mb-2">🚫 Blacklist Keywords Found:</p>
                        <div class="flex flex-wrap gap-2">
                            ${blacklistFound.map(kw => `<span class="bg-red-600 text-white px-3 py-1 rounded text-sm">${kw}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // Matched skills
            if (matchedSkills.length > 0) {
                resultsHTML += `
                    <div class="mb-4">
                        <p class="text-green-400 font-semibold mb-2">✅ Matched Skills (${matchedSkills.length}):</p>
                        <div class="flex flex-wrap gap-2">
                            ${matchedSkills.map(skill => `<span class="bg-green-600 text-white px-3 py-1 rounded text-sm">${skill}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            // Missing skills
            if (missingSkills.length > 0) {
                resultsHTML += `
                    <div class="mb-4">
                        <p class="text-yellow-400 font-semibold mb-2">⚠️ Missing Skills (${missingSkills.length}):</p>
                        <div class="flex flex-wrap gap-2">
                            ${missingSkills.slice(0, 15).map(skill => `<span class="bg-yellow-600 text-white px-3 py-1 rounded text-sm">${skill}</span>`).join('')}
                            ${missingSkills.length > 15 ? `<span class="bg-slate-600 text-white px-3 py-1 rounded text-sm">+${missingSkills.length - 15} more</span>` : ''}
                        </div>
                    </div>
                `;
            }

            resultsHTML += `</div>`;
            document.getElementById('results').innerHTML = resultsHTML;
        };
    </script>
</body>
</html>
```
